name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, Typecheck & Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter api prisma:generate
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm check-types

      - name: API unit tests
        run: pnpm --filter api test

  docker-api:
    name: Docker build (API)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f apps/api/Dockerfile .

  docker-api-runtime:
    name: Docker runtime healthcheck (API)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: marketing
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d marketing"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f apps/api/Dockerfile -t api:test .

      - name: Start API container
        run: |
          docker run -d \
            --name api-test \
            --network host \
            -e PORT=3000 \
            -e DATABASE_URL=postgresql://postgres:postgres@127.0.0.1:5432/marketing?schema=public \
            api:test

      - name: Wait for /api/health
        run: |
          for i in $(seq 1 30); do
            if curl -fsS "http://127.0.0.1:3000/api/health" >/dev/null; then
              echo "API healthcheck succeeded"
              exit 0
            fi
            sleep 2
          done
          echo "API healthcheck failed"
          docker logs api-test || true
          exit 1

      - name: Print API logs
        if: always()
        run: docker logs api-test || true

      - name: Stop API container
        if: always()
        run: docker rm -f api-test || true

  docker-web:
    name: Docker build (Web)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Web image
        run: docker build -f apps/web/Dockerfile .
